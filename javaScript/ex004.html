<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formatação de strings</title>
    <style>
        body{
            font: normal 20pt arial;
        }
    </style>
</head>
<body>
    <script>
        var nome = window.prompt('Qual é o seu nome?')
        document.write(`ola <strong>${nome}</strong>, o seu nome tem ${nome.length} tantas letras<br>`)
        document.write(`O seu nome em maiusculas fica ${nome.toUpperCase()}<br>`)
        document.write(`O seu nome em minusculas fica ${nome.toLowerCase()}`)
    </script>
</body>
</html>
